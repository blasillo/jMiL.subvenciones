spring.application.name=jMyL.Subvenciones
server.port=8080

# Database H2 Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# JSP Configuration
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Multipart file upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.root=INFO
logging.level.com.educativo.subvenciones=DEBUG

# Mensaje de bienvenida
spring.application.description=Aplicación vulnerable para educación en seguridad web

# =============================================================================
# ACTUATOR - VULNERABLE: todos los endpoints expuestos sin autenticación
# En producción NUNCA exponer "*". Endpoints sensibles:
#   /actuator/env      -> variables de entorno y propiedades (credenciales!)
#   /actuator/heapdump -> volcado completo del heap (datos en memoria!)
#   /actuator/mappings -> todos los endpoints de la app
#   /actuator/beans    -> todos los beans de Spring
#   /actuator/loggers  -> permite cambiar el nivel de log en caliente
#   /actuator/shutdown -> permite apagar la aplicación (POST)
# =============================================================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.env.show-values=always
management.endpoint.shutdown.enabled=true
management.endpoints.web.base-path=/actuator

# =============================================================================
# SWAGGER / OPENAPI
# Interfaz Swagger UI:  http://localhost:8080/swagger-ui.html
# JSON de la spec:      http://localhost:8080/v3/api-docs
# =============================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
# Incluye también los endpoints del Actuator en la documentación
springdoc.show-actuator=false

